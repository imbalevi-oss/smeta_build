<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"SRVSD-11056-stdout-1776167834202.txt","computername":"SRVSD","pid":11056,"type":"stdout","created":1776167834202},{"file":"SRVSD-11440-stderr-1776254145528.txt","computername":"SRVSD","pid":11440,"type":"stderr","created":1776254145528},{"file":"SRVSD-11440-stdout-1776254145526.txt","computername":"SRVSD","pid":11440,"type":"stdout","created":1776254145526},{"file":"SRVSD-9404-stderr-1776315182299.txt","computername":"SRVSD","pid":9404,"type":"stderr","created":1776315182299},{"file":"SRVSD-9404-stdout-1776315182297.txt","computername":"SRVSD","pid":9404,"type":"stdout","created":1776315182297},{"file":"SRVSD-9404-stdout-1776317139016.txt","computername":"SRVSD","pid":9404,"type":"stdout","created":1776317139016},{"file":"SRVSD-9432-stderr-1776174663751.txt","computername":"SRVSD","pid":9432,"type":"stderr","created":1776174663751},{"file":"SRVSD-9432-stdout-1776174663748.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174663748},{"file":"SRVSD-9432-stdout-1776174689370.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174689370},{"file":"SRVSD-9432-stdout-1776174690151.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174690151},{"file":"SRVSD-9432-stdout-1776174691312.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174691312},{"file":"SRVSD-9432-stdout-1776174692026.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174692026},{"file":"SRVSD-9432-stdout-1776174693028.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174693028},{"file":"SRVSD-9432-stdout-1776174693991.txt","computername":"SRVSD","pid":9432,"type":"stdout","created":1776174693991}];
        var lastUpdated = 1776317139020;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
